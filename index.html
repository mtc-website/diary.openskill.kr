<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Open Skill Diary — MSA · Kafka · WebSocket 시뮬레이터</title>
<meta name="description" content="MSA, Kafka, WebSocket, SSE 등 분산 시스템 핵심 개념을 인터랙티브 시뮬레이터로 배우는 기술 다이어리" />
<link rel="stylesheet" href="assets/style.css" />
<script>
  (function(){
    try {
      var t = localStorage.getItem('blog-theme');
      if (!t) { t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'; }
      document.documentElement.setAttribute('data-theme', t);
    } catch(e){}
  })();
</script>
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a class="site-brand" href="./">
        <span class="site-brand__logo">◆</span>
        <span class="site-brand__name">Open Skill Diary</span>
      </a>
      <nav class="site-nav">        <!-- pagefind:body:start -->
        <div class="osd-search-wrap">
          <input id="osd-search-input" type="search" placeholder="검색…" autocomplete="off" />
        </div>
        <!-- pagefind:body:end -->
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="테마 전환">
          <span class="theme-toggle__icon theme-toggle__icon--sun">☀</span>
          <span class="theme-toggle__icon theme-toggle__icon--moon">☾</span>
        </button>
      </nav>
    </div>
  </header>

  <main class="site-main">
    <section class="hero">
      <div class="hero__inner">
        <p class="hero__eyebrow">Tech Diary</p>
        <h1 class="hero__title">분산 시스템을 직접 돌려보며 배우다</h1>
        <p class="hero__lede">MSA, Kafka, WebSocket, SSE — 추상적인 개념을 인터랙티브 시뮬레이터로 시각화하고 손끝으로 검증합니다.</p>
        <div class="hero__categories" id="hero-categories"></div>
      </div>
    </section>

    <section class="posts" id="posts">
      <div class="posts__header">
        <h2 class="posts__title">최근 글</h2>
        <div class="posts__filter" id="posts-filter"></div>
      </div>
      <ul class="posts__list" id="posts-list"></ul>
      <nav class="posts__pager" id="posts-pager" aria-label="페이지"></nav>
    </section>
</main>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <span>© 2026 Open Skill Diary</span>
      <span>Built with curiosity & coffee ☕</span>
    </div>
  </footer>

  <script src="assets/script.js"></script>
  <!-- pagefind:deps:start -->
  <script type="module">
    import("./pagefind/pagefind.js")
      .then(pf => { window.__pagefind = pf; pf.init && pf.init(); })
      .catch(() => { /* 빌드 전이거나 미생성 — 폴백 substring 매치로 동작 */ });
  </script>
  <!-- pagefind:deps:end -->
</body>
</html>
