<!DOCTYPE html>

<head>
<!-- ======= Open Skill Diary theme adapter (injected) ======= -->
<style id="osd-theme-adapter">
  /* Reserve space for the floating bar — adapter does NOT touch the simulator's
     own max-width / centering. If the simulator has .container { max-width: ...;
     margin: 0 auto } it stays centered; if it has none, it stays full-width. */
  body { padding-top: 56px !important; }

  /* Allow page to grow naturally — many simulators set
     html, body { height:100%; overflow:hidden } to lock viewport. The adapter
     overrides this so floating bar + appended comments are reachable via scroll. */
  html, body {
    height: auto !important;
    min-height: 100% !important;
    overflow: visible !important;
    overflow-y: auto !important;
  }

  /* Bidirectional inversion: applied only when the source tone differs from
     the selected blog theme. If they match, the original colors are kept
     untouched. The wrapper isolates the filter from the floating bar. */
  html[data-osd-source-theme="dark"][data-osd-theme="light"] body { background: #f7f8fb !important; }
  html[data-osd-source-theme="light"][data-osd-theme="dark"] body { background: #0c1220 !important; }

  html[data-osd-source-theme="dark"][data-osd-theme="light"] #osd-content-wrapper,
  html[data-osd-source-theme="light"][data-osd-theme="dark"] #osd-content-wrapper {
    filter: invert(0.92) hue-rotate(180deg);
    min-height: 100vh;
  }
  html[data-osd-source-theme="dark"][data-osd-theme="light"] #osd-content-wrapper img,
  html[data-osd-source-theme="dark"][data-osd-theme="light"] #osd-content-wrapper svg,
  html[data-osd-source-theme="dark"][data-osd-theme="light"] #osd-content-wrapper video,
  html[data-osd-source-theme="dark"][data-osd-theme="light"] #osd-content-wrapper canvas,
  html[data-osd-source-theme="light"][data-osd-theme="dark"] #osd-content-wrapper img,
  html[data-osd-source-theme="light"][data-osd-theme="dark"] #osd-content-wrapper svg,
  html[data-osd-source-theme="light"][data-osd-theme="dark"] #osd-content-wrapper video,
  html[data-osd-source-theme="light"][data-osd-theme="dark"] #osd-content-wrapper canvas {
    filter: invert(1) hue-rotate(180deg);
  }

  /* Floating top bar — fixed, very high z-index, sits above wrapper */
  #osd-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 2147483647;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; padding: 10px 16px;
    background: rgba(15, 22, 36, 0.85);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.12);
    color: #e8eef9;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard",
                 "Noto Sans KR", sans-serif;
    font-size: 13px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
  }
  html[data-osd-theme="light"] #osd-bar {
    background: rgba(255,255,255,0.92);
    border-bottom: 1px solid #e3e8ef;
    color: #1a2332;
    box-shadow: 0 1px 3px rgba(20,30,50,0.06), 0 4px 16px rgba(20,30,50,0.04);
  }
  #osd-bar a, #osd-bar button {
    color: inherit; background: transparent; border: 1px solid currentColor;
    border-radius: 8px; padding: 6px 12px; font-size: 12px; font-weight: 600;
    text-decoration: none; cursor: pointer;
    opacity: 0.85; transition: opacity .15s, transform .15s;
    font-family: inherit;
  }
  #osd-bar a:hover, #osd-bar button:hover { opacity: 1; transform: translateY(-1px); }
  #osd-bar .osd-bar__title { font-weight: 700; letter-spacing: -0.2px; opacity: 0.9;
    flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  #osd-bar .osd-bar__actions { display: flex; gap: 8px; flex-shrink: 0; }
  #osd-bar .osd-bar__brand { font-weight: 700; font-size: 13px; opacity: 0.7; flex-shrink: 0; }
  @media (max-width: 640px) {
    #osd-bar { padding: 8px 10px; font-size: 12px; }
    #osd-bar .osd-bar__title { display: none; }
  }
</style>
<script>
  (function(){
    document.documentElement.setAttribute('data-osd-source-theme', 'dark');
    try {
      var t = localStorage.getItem('blog-theme') || 'dark';
      document.documentElement.setAttribute('data-osd-theme', t);
    } catch(e){}
  })();
</script>

<style>

.banner.dum .box{border-color:#eab308;box-shadow:0 0 24px rgba(234,179,8,.15);} .banner.dum .st2{color:#fde68a;}
.banner.err .box{border-color:#ef4444;box-shadow:0 0 24px rgba(239,68,68,.2);} .banner.err .st2{color:#fca5a5;}
.banner.csr-b .box{border-color:#06b6d4;box-shadow:0 0 24px rgba(6,182,212,.15);} .banner.csr-b .st2{color:#a5f3fc;}

.err-flash{position:absolute;inset:0;background:rgba(127,29,29,.12);z-index:5;display:none;animation:ef .3s;}

.empty .icon{font-size:40px;margin-bottom:8px;} .empty .t1{font-size:15px;font-weight:600;} .empty .t2{font-size:12px;margin-top:2px;}
</style>

<script>
  // Wrap body content so the light-mode filter applies only to wrapper, not to floating bar
  (function(){
    function wrap(){
      var bar = document.getElementById('osd-bar');
      var wrapper = document.createElement('div');
      wrapper.id = 'osd-content-wrapper';
      wrapper.style.cssText = 'transition: filter .25s;';
      var nodes = Array.prototype.slice.call(document.body.childNodes);
      nodes.forEach(function(n){ if (n === bar) return; wrapper.appendChild(n); });
      document.body.appendChild(wrapper);
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', wrap, { once: true });
    } else { wrap(); }
  })();
</script>

<script>

    var btn = document.getElementById('osd-theme-toggle');
    if (!btn) return;
    btn.addEventListener('click', function(){
      var cur = document.documentElement.getAttribute('data-osd-theme') || 'dark';
      var next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-osd-theme', next);
      try { localStorage.setItem('blog-theme', next); } catch(e){}
    });

</script>

<div class="app">
  <div class="header">
    <div><h1>SSE (Server-Sent Events) 시뮬레이터</h1><p>단방향 실시간 Push — Response 스트림을 유지하여 서버 → 클라이언트로 이벤트 전송</p></div>
    <div style="font-size:10px;color:#475569;">⚠ SseEmitter 생성 직후 <strong style="color:#fde68a;">반드시 dummy-data 1회 전송</strong> 필요 (503 방지)</div>
  </div>
  <div class="main">
    <div class="ctrl">
      <div class="sec-title">서버 제어</div>
      <div class="status-row"><div id="dot" class="dot"></div><span id="stxt" class="status-text" style="color:#fca5a5;">서버 중지됨</span></div>
      <div class="stats">
        <div class="st"><div id="sC" class="v">0</div><div class="l">클라이언트</div></div>
        <div class="st"><div id="sM" class="v">0</div><div class="l">메시지</div></div>
        <div class="st"><div id="sT" class="v">0s</div><div class="l">가동시간</div></div>
      </div>
      <div class="btns">
        <button id="bGo" class="b-go" onclick="startServer()">서버 시작</button>
        <button id="bSt" class="b-stop b-off" onclick="stopServer()" disabled>서버 중지</button>
        <div style="border-top:1px solid #475569;margin:2px 0;"></div>
        <button id="bAdd" class="b-add b-off" onclick="addClient(true)" disabled>클라이언트 추가 (dummy O)</button>
        <button id="b503" class="b-503 b-off" onclick="addClient(false)" disabled>클라이언트 추가 (dummy X) — 503!</button>
        <div style="border-top:1px solid #475569;margin:2px 0;"></div>
        <button id="bCast" class="b-cast b-off" onclick="broadcastMessage()" disabled>전체 브로드캐스트</button>
      </div>
      <div class="sec-title">연결된 클라이언트</div>
      <div id="cList" class="client-list"></div>
    </div>

    <div class="viz">
      <div class="viz-title">네트워크 시각화 — SSE 연결 흐름</div>
      <div class="canvas-wrap" id="canvasWrap">
        <div id="errFlash" class="err-flash"></div>
        <svg id="svg">
          <defs>
            <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#22c55e" opacity=".5"/></marker>
            <filter id="gl"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            <filter id="gls"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          </defs>
          <g id="sNode" style="display:none;">
            <rect x="-52" y="-36" width="104" height="72" rx="10" fill="#1e293b" stroke="#334155" stroke-width="2"/>
            <text x="0" y="-10" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="bold">Spring Boot</text>
            <text x="0" y="5" text-anchor="middle" fill="#94a3b8" font-size="9">SseEmitters</text>
            <text x="0" y="18" text-anchor="middle" fill="#64748b" font-size="8">(ConcurrentHashMap)</text>
            <text x="0" y="30" text-anchor="middle" fill="#64748b" font-size="8">:8080</text>
          </g>
        </svg>
        <div id="banner" class="banner"><div class="box"><div id="bn" class="sn"></div><div id="bt" class="st2"></div><div id="bd" class="sd"></div><div id="bc" class="sc" style="display:none;"></div></div></div>
        <div id="empty" class="empty"><div class="icon">📡</div><div class="t1">서버를 시작해주세요</div><div class="t2">SSE 연결 시뮬레이션을 시작합니다</div></div>

<script>
let running=false,startT=null,clients=[],cCnt=0,mCnt=0,uptimeId=null,timers=[];
const TIMEOUT=60000,COLORS=['#3b82f6','#22c55e','#eab308','#ef4444','#a855f7','#ec4899','#06b6d4','#f97316'];
const $=id=>document.getElementById(id);

function now(){const d=new Date();return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;}
function log(m,c='info'){const e=document.createElement('div');e.className='le '+c;e.innerHTML=`<span class="t">[${now()}]</span>${m}`;$('logBox').appendChild(e);$('logBox').scrollTop=$('logBox').scrollHeight;}
function showB(n,t,d,c,cls=''){$('banner').className='banner show '+cls;$('bn').textContent=n;$('bt').textContent=t;$('bd').innerHTML=d;if(c){$('bc').textContent=c;$('bc').style.display='inline-block';}else $('bc').style.display='none';}
function hideB(){$('banner').className='banner';}
function stats(){const cn=clients.filter(c=>c.on).length;$('sC').textContent=cn;$('sM').textContent=mCnt;if(!startT){$('sT').textContent='0s';return;}const s=Math.floor((Date.now()-startT)/1000),m=Math.floor(s/60);$('sT').textContent=m>0?m+'m '+(s%60)+'s':s+'s';}
function setBtn(id,on){const b=$(id);if(on){b.classList.remove('b-off');b.disabled=false;}else{b.classList.add('b-off');b.disabled=true;}}

// ===== SERVER =====
function startServer(){
  running=true;startT=Date.now();
  $('dot').classList.add('on');$('stxt').textContent='서버 가동 중';$('stxt').style.color='#86efac';
  setBtn('bGo',false);setBtn('bSt',true);setBtn('bAdd',true);setBtn('b503',true);
  $('empty').style.display='none';
  const h=$('svg').getBoundingClientRect().height;
  $('sNode').setAttribute('transform',`translate(120,${h/2})`);$('sNode').style.display='';
  log('Spring Boot 서버 시작 — SseEmitters 초기화','ok');
  uptimeId=setInterval(stats,1000);stats();
  showB('서버 시작','Spring Boot 가동','GET /connect (text/event-stream) 준비 완료',null);setTimeout(hideB,1800);
}
function stopServer(){
  running=false;clearInterval(uptimeId);timers.forEach(t=>clearInterval(t));timers=[];
  clients.forEach(c=>{if(c.on){c.on=false;}});clients=[];cCnt=0;
  $('dot').classList.remove('on');$('stxt').textContent='서버 중지됨';$('stxt').style.color='#fca5a5';
  setBtn('bGo',true);setBtn('bSt',false);setBtn('bAdd',false);setBtn('b503',false);setBtn('bCast',false);
  $('msgIn').disabled=true;setBtn('bSend',false);
  $('sNode').style.display='none';$('empty').style.display='';$('errFlash').style.display='none';
  log('서버 중지','dc');hideB();stats();renderList();renderNet();
}

// ===== CLIENT =====
function addClient(dummy){
  if(!running)return;cCnt++;
  const sid='sess_'+Math.random().toString(36).substr(2,6);
  const cl={id:'Client-'+cCnt,sid,on:false,dummy,color:COLORS[(cCnt-1)%COLORS.length],elapsed:0,timerId:null};
  clients.push(cl);

  showB('STEP 1/4','GET /connect 요청','브라우저가 EventSource로 SSE 연결 요청','const sse = new EventSource("/connect");');
  log(`━━ ${cl.id} 연결 시작 ${dummy?'':'(⚠ dummy 없이!)'} ━━`,dummy?'ok':'cr');
  log(`${cl.id} → new EventSource("/connect")`,'info');

  setTimeout(()=>{
    if(!running)return;
    showB('STEP 2/4','SseEmitter 생성','서버가 SseEmitter(60초)를 생성 → ConcurrentHashMap 저장',`new SseEmitter(60*1000L)\nsseEmitters.add("${sid}", emitter)`);
    log(`서버: new SseEmitter(60000L)`,'info');
    log(`서버: sseEmitters.add("${sid}", emitter)`,'ok');
    cl.on=true;stats();renderList();renderNet();

    setTimeout(()=>{
      if(!running||!cl.on)return;
      if(dummy){
        showB('STEP 3/4','⚡ dummy-data 즉시 전송!','SseEmitter 생성 직후 반드시 1회 전송!\n미전송 시 → 503 Service Unavailable',`emitter.send(SseEmitter.event()\n  .name("connect")\n  .data("dummy-data"));`,'dum');
        log('⚡ 서버 → '+cl.id+': dummy-data 즉시 전송!','dm');
        log('  이 전송이 없으면 503 에러 발생!','dm');

        animatePacket(cl,'⚡ dummy-data','#eab308',true,()=>{
          showB('STEP 4/4','클라이언트: CSR 처리','addEventListener("connect") 콜백 실행\ndummy-data 수신 확인 → 연결 완료',`sse.addEventListener('connect', (e) => {\n  console.log(e.data); // "dummy-data"\n});`,'csr-b');
          log(`${cl.id}: CSR → addEventListener('connect') 콜백 실행`,'csr');
          log(`${cl.id}: ✅ "dummy-data" 수신 확인 → 연결 완료!`,'csr');
          setBtn('bCast',true);$('msgIn').disabled=false;setBtn('bSend',true);
          setTimeout(hideB,2200);
          startTimer(cl);
        });
      } else {
        showB('STEP 3/4','⚠ dummy-data 전송 생략!','아무 데이터도 보내지 않음...',`// emitter.send() 호출 안 함!`,'err');
        log('⚠ 서버: dummy-data 전송하지 않음!','cr');
        setTimeout(()=>{
          if(!running)return;
          showB('503 ERROR','🚨 503 Service Unavailable','dummy-data 미전송 → 재연결 시 503!\n\n해결: 생성 직후 dummy-data 즉시 전송',`emitter.send(SseEmitter.event()\n  .name("connect").data("dummy-data"));`,'err');
          $('errFlash').style.display='block';setTimeout(()=>$('errFlash').style.display='none',2500);
          log('🚨 '+cl.id+': 503 Service Unavailable!','cr');
          log('💡 해결: emitter.send(event().name("connect").data("dummy-data"))','dm');
          cl.on=false;stats();renderList();renderNet();
          setTimeout(hideB,5000);
        },2200);
      }
    },1000);
  },700);
}

function startTimer(cl){
  cl.elapsed=0;
  const tid=setInterval(()=>{
    if(!cl.on){clearInterval(tid);return;}
    cl.elapsed+=1000;renderList();
    if(cl.elapsed>=TIMEOUT){
      clearInterval(tid);
      log(`${cl.id} — onTimeout(60초) → complete()`,'dc');
      cl.on=false;stats();renderList();renderNet();
      showB('타임아웃','⏱ 60초 타임아웃','onTimeout → complete() → onCompletion\n브라우저 자동 재연결',null);
      setTimeout(()=>{
        if(!running)return;hideB();
        cl.on=true;cl.elapsed=0;
        log(`${cl.id} — 브라우저 자동 재연결`,'info');
        log(`서버: 재연결 → new SseEmitter + add()`,'ok');
        log(`⚡ 서버 → ${cl.id}: dummy-data 재전송 (재연결에도 필수!)`,'dm');
        stats();renderList();renderNet();
        animatePacket(cl,'⚡ dummy-data','#eab308',true,()=>{
          log(`${cl.id}: CSR → "dummy-data" 수신 확인`,'csr');
        });
        startTimer(cl);
      },2000);
    }
  },1000);
  cl.timerId=tid;timers.push(tid);
}

function disconnectClient(id){
  const cl=clients.find(c=>c.id===id);if(!cl||!cl.on)return;
  cl.on=false;if(cl.timerId)clearInterval(cl.timerId);
  log(`${cl.id} — EventSource.close()`,'dc');
  stats();renderList();renderNet();
  if(!clients.some(c=>c.on)){setBtn('bCast',false);$('msgIn').disabled=true;setBtn('bSend',false);}
}

// ===== MESSAGING =====
function sendMessage(){
  const inp=$('msgIn'),msg=inp.value.trim();if(!msg||!running)return;inp.value='';
  mCnt++;const cid=mCnt,obj={id:cid,msg};
  log(`━━ 메시지: "${msg}" ━━`,'ev');
  log(`클라이언트 → POST /chat {msg:"${msg}"}`,'info');

  setTimeout(()=>{
    log(`서버: chatService.save() → Chat{id:${cid}}`,'info');
    log(`서버: sseEmitters.sendAll(chat) — 모든 emitter에 push!`,'ev');
    showB('SSE PUSH','서버 → 클라이언트 Push','기존 Response 스트림으로 전송\n새 HTTP 요청 없이 서버가 push!',`emitter.send(SseEmitter.event()\n  .name("chat").data(chat));`);

    const connected=clients.filter(c=>c.on);
    connected.forEach((cl,i)=>{
      setTimeout(()=>{
        // ★ 타임아웃 완전 초기화 (0으로 리셋)
        cl.elapsed=0;
        renderList();

        log(`서버 → ${cl.id}: event:chat, data:${JSON.stringify(obj)}`,'ev');
        animatePacket(cl,msg,'#a855f7',false,()=>{
          log(`${cl.id}: CSR → addEventListener('chat') 콜백`,'csr');
          log(`${cl.id}: CSR → JSON.parse → changeDom("${msg}")`,'csr');
          log(`${cl.id}: DOM에 <li>${msg}</li> prepend 완료`,'csr');

          showB('CSR 렌더링',`${cl.id}: DOM 업데이트`,`addEventListener('chat') 콜백 실행\nJSON.parse(data) → changeDom()\n화면에 새 메시지를 동적으로 추가`,`sse.addEventListener('chat', e => {\n  let chat = JSON.parse(e.data);\n  changeDom(chat.msg);\n  // → <li>${msg}</li> prepend\n});`,'csr-b');
          setTimeout(hideB,2200);
        });
      },i*250);
    });
    stats();
  },350);
}

function broadcastMessage(){
  const m=['안녕하세요!','새로운 알림','서버 상태: 정상','실시간 업데이트!','이벤트 발생!'];
  $('msgIn').value=m[Math.floor(Math.random()*m.length)];sendMessage();
}

// ===== RENDER =====
function renderList(){
  const el=$('cList');el.innerHTML='';
  clients.forEach(cl=>{
    const pct=cl.on?Math.min(100,cl.elapsed/TIMEOUT*100):0;
    const bc=pct>80?'d':pct>50?'w':'';
    const rem=cl.on?Math.max(0,Math.ceil((TIMEOUT-cl.elapsed)/1000)):0;
    const isErr=!cl.on&&!cl.dummy;
    const d=document.createElement('div');d.className='cc '+(cl.on?'ok':isErr?'err':'');
    d.innerHTML=`<span class="nm" style="color:${cl.color}">${cl.id}</span>${!cl.dummy?' <span style="color:#f97316;font-size:9px;">(no dummy)</span>':''}${cl.on?`<button onclick="disconnectClient('${cl.id}')">끊기</button>`:''}<div class="sid">${cl.sid}</div><div class="st-line" style="color:${cl.on?'#22c55e':isErr?'#ef4444':'#64748b'}">${cl.on?'● 연결됨 — '+rem+'초 남음':isErr?'✖ 503 에러':'○ 해제됨'}</div>${cl.on?`<div class="tbar"><div class="tfill ${bc}" style="width:${pct}%"></div></div>`:''}`;
    el.appendChild(d);
  });
}

function renderNet(){
  const svg=$('svg'),r=svg.getBoundingClientRect(),w=r.width,h=r.height,sx=120,sy=h/2;
  $('sNode').setAttribute('transform',`translate(${sx},${sy})`);
  svg.querySelectorAll('.cn,.cl').forEach(e=>e.remove());
  if(!clients.length)return;

  clients.forEach((cl,i)=>{
    const cx=w-100,sp=Math.min(70,(h-40)/Math.max(clients.length,1)),stY=sy-((clients.length-1)*sp)/2,cy=stY+i*sp;
    const isErr=!cl.on&&!cl.dummy;

    if(cl.on||isErr){
      const ln=document.createElementNS('http://www.w3.org/2000/svg','line');
      ln.setAttribute('class','cl');ln.setAttribute('x1',sx+52);ln.setAttribute('y1',sy);ln.setAttribute('x2',cx-45);ln.setAttribute('y2',cy);
      ln.setAttribute('stroke',isErr?'#ef4444':cl.color);ln.setAttribute('stroke-opacity',isErr?'.15':'.3');
      ln.setAttribute('stroke-width','2');ln.setAttribute('stroke-dasharray',isErr?'4,8':'6,4');
      if(cl.on)ln.setAttribute('marker-end','url(#ag)');
      svg.insertBefore(ln,$('sNode'));
      const lb=document.createElementNS('http://www.w3.org/2000/svg','text');lb.setAttribute('class','cl');
      lb.setAttribute('x',(sx+52+cx-45)/2);lb.setAttribute('y',(sy+cy)/2-7);
      lb.setAttribute('text-anchor','middle');lb.setAttribute('font-size','8');
      lb.setAttribute('fill',isErr?'#ef4444':'#475569');lb.setAttribute('font-weight',isErr?'bold':'normal');
      lb.textContent=isErr?'✖ 503 — dummy 미전송!':'Response 스트림 유지 (단방향) →';
      svg.insertBefore(lb,$('sNode'));
    }

    const g=document.createElementNS('http://www.w3.org/2000/svg','g');g.setAttribute('class','cn');g.setAttribute('transform',`translate(${cx},${cy})`);
    const nr=document.createElementNS('http://www.w3.org/2000/svg','rect');
    nr.setAttribute('x','-45');nr.setAttribute('y','-22');nr.setAttribute('width','90');nr.setAttribute('height','44');nr.setAttribute('rx','7');
    nr.setAttribute('fill',isErr?'#1c1917':cl.on?'#0f172a':'#1e293b');
    nr.setAttribute('stroke',isErr?'#ef4444':cl.on?cl.color:'#334155');
    nr.setAttribute('stroke-width',isErr||cl.on?'2':'1');
    if(cl.on)nr.setAttribute('filter','url(#gl)');g.appendChild(nr);
    const nt=document.createElementNS('http://www.w3.org/2000/svg','text');nt.setAttribute('y','-4');nt.setAttribute('text-anchor','middle');
    nt.setAttribute('fill',isErr?'#fca5a5':cl.on?cl.color:'#64748b');nt.setAttribute('font-size','11');nt.setAttribute('font-weight','bold');
    nt.textContent=cl.id;g.appendChild(nt);
    const st=document.createElementNS('http://www.w3.org/2000/svg','text');st.setAttribute('y','10');st.setAttribute('text-anchor','middle');st.setAttribute('font-size','8');
    st.setAttribute('fill',isErr?'#ef4444':cl.on?'#22c55e':'#64748b');
    st.textContent=isErr?'503 Error!':cl.on?'EventSource 연결됨':'연결 해제';g.appendChild(st);
    svg.appendChild(g);cl._p={x:cx,y:cy};
  });
}

function animatePacket(cl,msg,color,isDummy,onDone){
  if(!cl._p||!cl.on){if(onDone)onDone();return;}
  const svg=$('svg'),r=svg.getBoundingClientRect(),sx=120+52,sy=r.height/2,cx=cl._p.x-45,cy=cl._p.y;
  const g=document.createElementNS('http://www.w3.org/2000/svg','g'),rad=isDummy?9:6;

  if(isDummy){
    const oc=document.createElementNS('http://www.w3.org/2000/svg','circle');
    oc.setAttribute('r','15');oc.setAttribute('fill','none');oc.setAttribute('stroke',color);
    oc.setAttribute('stroke-width','2');oc.setAttribute('opacity','.5');oc.setAttribute('filter','url(#gls)');g.appendChild(oc);
  }
  const ci=document.createElementNS('http://www.w3.org/2000/svg','circle');
  ci.setAttribute('r',String(rad));ci.setAttribute('fill',color);ci.setAttribute('filter',isDummy?'url(#gls)':'url(#gl)');g.appendChild(ci);
  const lb=document.createElementNS('http://www.w3.org/2000/svg','text');lb.setAttribute('y',isDummy?'-20':'-12');lb.setAttribute('text-anchor','middle');
  lb.setAttribute('fill',color);lb.setAttribute('font-size',isDummy?'11':'10');lb.setAttribute('font-weight','bold');
  lb.textContent=msg.length>16?msg.substring(0,16)+'…':msg;g.appendChild(lb);
  if(isDummy){
    const sl=document.createElementNS('http://www.w3.org/2000/svg','text');sl.setAttribute('y',String(rad+14));sl.setAttribute('text-anchor','middle');
    sl.setAttribute('fill','#fde68a');sl.setAttribute('font-size','8');sl.textContent='503 방지 필수 전송!';g.appendChild(sl);
  }
  svg.appendChild(g);
  const dur=isDummy?1000:700,st=performance.now();
  function step(t){
    const p=Math.min(1,(t-st)/dur),e=p<.5?2*p*p:-1+(4-2*p)*p;
    g.setAttribute('transform',`translate(${sx+(cx-sx)*e},${sy+(cy-sy)*e})`);
    if(isDummy&&g.firstChild)g.firstChild.setAttribute('r',String(15+Math.sin(p*Math.PI*3)*3));
    if(p<1)requestAnimationFrame(step);
    else{ci.setAttribute('r',String(isDummy?16:10));ci.setAttribute('opacity','.5');setTimeout(()=>{g.remove();if(onDone)onDone();},isDummy?400:250);}
  }
  requestAnimationFrame(step);
}

window.addEventListener('resize',()=>{if(running)renderNet();});
</script>
